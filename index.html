function getMockResponse(q) {
  q = q.toLowerCase();
  if(q.includes("perp")||q.includes("hyperliquid")||q.includes("gmx")||q.includes("dydx")||q.includes("futures")||q.includes("leverage")||q.includes("плеч")) return AI_RESPONSES.perps;
  if(q.includes("option")||q.includes("call")||q.includes("put")||q.includes("ribbon")||q.includes("vault")) return AI_RESPONSES.options;
  if(q.includes("stable")||q.includes("curve")||q.includes("pendle")||q.includes("convex")||q.includes("usdc")) return AI_RESPONSES.stables;
  if(q.includes("market mak")||q.includes("mm ")||q.includes("uniswap")||q.includes(" lp")||q.includes("liquidity")) return AI_RESPONSES.mm;
  if(q.includes("govern")||q.includes("vetoken")||q.includes("bribe")||q.includes("votium")||q.includes("dao")) return AI_RESPONSES.governance;
  if(q.includes("strateg")||q.includes("return")||q.includes("perform")||q.includes("ytd")||q.includes("agent")) return AI_RESPONSES.strategy;
  if(q.includes("securit")||q.includes("layer")||q.includes("6 layer")||q.includes("6-layer")) return AI_RESPONSES.security;
  if(q.includes("zk")||q.includes("zero knowledge")||q.includes("zero-knowledge")||q.includes("privacy")||q.includes("shielded")||q.includes("приват")||q.includes("конфиденц")) return AI_RESPONSES.zk;
  if(q.includes("predict")||q.includes("polymarket")||q.includes("kalshi")||q.includes("betting")||q.includes("forecast")||q.includes("odds")||q.includes("прогноз")||q.includes("ставк")) return AI_RESPONSES.prediction;
  if(q.includes("guard")||q.includes("dust")||q.includes("poison")||q.includes("mev")||q.includes("flash loan")||q.includes("sandwich")||q.includes("slippage guard")||q.includes("гуард")) return AI_RESPONSES.guard;
  if(q.includes("protect")||q.includes("pre-flight")||q.includes("preflight")||q.includes("screening")||q.includes("time-lock")||q.includes("timelock")||q.includes("circuit breaker")||q.includes("безопасн")||q.includes("защит")) return AI_RESPONSES.protection;
  if(q.includes("risk")||q.includes("drawdown")||q.includes("sharpe")) return AI_RESPONSES.risk;
  if(q.includes("revenue")||q.includes("money")||q.includes("projec")||q.includes("income")||q.includes("business")) return AI_RESPONSES.revenue;
  if(q.includes("game")||q.includes("land")||q.includes("sandbox")||q.includes("nft")||q.includes("metaverse")) return AI_RESPONSES.gamefi;
  if(q.includes("dca")||q.includes("yield")||q.includes("compar")||q.includes(" vs ")||q.includes("сравн")) return AI_RESPONSES.strategy;
  return AI_RESPONSES.default[Math.floor(Math.random()*2)];
}

const fmt = n => n>=1e9?`$${(n/1e9).toFixed(2)}B`:n>=1e6?`$${(n/1e6).toFixed(1)}M`:n>=1e3?`$${(n/1e3).toFixed(1)}K`:`$${n}`;

const StatusDot = ({s}) => <span style={{width:8,height:8,borderRadius:"50%",display:"inline-block",background:s==="active"?"#A3FF12":s==="paused"?"#FF9800":"#FF5252",marginRight:6}}/>;

const RiskBadge = ({l}) => {
  const c={low:{bg:"#0d2818",fg:"#A3FF12"},medium:{bg:"#2a1f00",fg:"#FF9800"},high:{bg:"#2a0a0a",fg:"#FF5252"}}[l]||{bg:"#1F2937",fg:"#888"};
  return <span style={{background:c.bg,color:c.fg,padding:"2px 10px",borderRadius:12,fontSize:11,fontWeight:600,textTransform:"uppercase"}}>{l}</span>;
};

const Card = ({children,style,onClick}) =>
  <div onClick={onClick}
    style={{background:"#111827",borderRadius:12,border:"1px solid #1F2937",padding:20,transition:"border-color 0.2s",cursor:onClick?"pointer":"default",...style}}
    onMouseEnter={e=>{if(onClick)e.currentTarget.style.borderColor="#A3FF12"}}
    onMouseLeave={e=>{if(onClick)e.currentTarget.style.borderColor="#1F2937"}}>
    {children}
  </div>;

const Metric = ({label,value,sub,trend,warn}) =>
  <Card style={{flex:"1 1 170px"}}>
    <div style={{fontSize:11,color:"#888",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>{label}</div>
    <div style={{fontSize:24,fontWeight:700,color:warn?"#FF5252":"#fff",lineHeight:1.2}}>{value}</div>
    {(sub||trend!==undefined)&&<div style={{display:"flex",alignItems:"center",gap:6,marginTop:4}}>
      {trend!==undefined&&<span style={{fontSize:12,fontWeight:600,color:trend>=0?"#A3FF12":"#FF5252"}}>{trend>=0?"+":""}{trend}%</span>}
      {sub&&<span style={{fontSize:11,color:"#666"}}>{sub}</span>}
    </div>}
  </Card>;

const SideItem = ({icon,label,active,onClick,badge}) =>
  <div onClick={onClick} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 16px",borderRadius:8,cursor:"pointer",background:active?"#A3FF1215":"transparent",color:active?"#A3FF12":"#888",fontWeight:active?600:400,fontSize:13,transition:"all 0.15s",borderLeft:active?"3px solid #A3FF12":"3px solid transparent"}}>
    <span style={{fontSize:16,width:20,textAlign:"center"}}>{icon}</span>
    <span style={{flex:1}}>{label}</span>
    {badge&&<span style={{background:badge==="AI"?"#A3FF12":"#E040FB",color:"#000",fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:6}}>{badge}</span>}
  </div>;

const Btn = ({children,primary,onClick,disabled,style:s}) =>
  <button onClick={onClick} disabled={disabled} style={{padding:"10px 20px",borderRadius:8,border:primary?"none":"1px solid #333",background:primary?(disabled?"#555":"#A3FF12"):"transparent",color:primary?"#000":"#fff",fontSize:13,fontWeight:primary?700:400,cursor:disabled?"wait":"pointer",fontFamily:"inherit",transition:"all 0.15s",...s}}>
    {children}
  </button>;

const RiskRing = ({score,size=80}) => {
  const r=32,circ=2*Math.PI*r,offset=circ*(1-score/100);
  const color=score>=70?"#FF5252":score>=40?"#FF9800":"#A3FF12";
  return <svg width={size} height={size} viewBox="0 0 80 80">
    <circle cx="40" cy="40" r={r} fill="none" stroke="#1F2937" strokeWidth="6"/>
    <circle cx="40" cy="40" r={r} fill="none" stroke={color} strokeWidth="6" strokeLinecap="round"
      strokeDasharray={circ} strokeDashoffset={offset} transform="rotate(-90 40 40)" style={{transition:"stroke-dashoffset 0.8s ease"}}/>
    <text x="40" y="44" textAnchor="middle" fill={color} fontSize="20" fontWeight="800" fontFamily="monospace">{score}</text>
  </svg>;
};

function MiniChart({data,color="#A3FF12"}) {
  if(!data||data.length<2) return null;
  const w=120,h=36,min=Math.min(...data),max=Math.max(...data),range=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-(((v-min)/range)*h*0.85+h*0.075)}`).join(" ");
  const fillPts=`0,${h} ${pts} ${w},${h}`;
  const gid="mc"+Math.random().toString(36).slice(2,8);
  return <svg width={w} height={h} style={{display:"block"}}>
    <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stopColor={color} stopOpacity={0.25}/><stop offset="100%" stopColor={color} stopOpacity={0.02}/>
    </linearGradient></defs>
    <polygon points={fillPts} fill={`url(#${gid})`}/>
    <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round"/>
  </svg>;
}

async function replicateMusicGen(prompt, genre, apiKey) {
  const fullPrompt = genre ? `${genre} music, ${prompt}` : prompt;
  const res = await fetch("https://api.replicate.com/v1/models/meta/musicgen/predictions", {
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":`Token ${apiKey}`,"Prefer":"wait"},
    body:JSON.stringify({input:{prompt:fullPrompt,model_version:"stereo-large",output_format:"mp3",duration:30,normalization_strategy:"peak"}})
  });
  if(!res.ok) throw new Error(`Replicate error: ${res.status}`);
  const data = await res.json();
  // Poll if not done
  if(data.status==="starting"||data.status==="processing") {
    for(let i=0;i<60;i++){
      await new Promise(r=>setTimeout(r,3000));
      const poll = await fetch(`https://api.replicate.com/v1/predictions/${data.id}`,{headers:{"Authorization":`Token ${apiKey}`}});
      const p = await poll.json();
      if(p.status==="succeeded") return p.output;
      if(p.status==="failed") throw new Error("Generation failed: "+p.error);
    }
    throw new Error("Timeout");
  }
  return data.output;
}

async function runwayVideoGen(prompt, apiKey) {
  const res = await fetch("https://api.dev.runwayml.com/v1/text_to_video", {
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`,"X-Runway-Version":"2024-11-06"},
    body:JSON.stringify({promptText:prompt,model:"gen3a_turbo",duration:5,ratio:"1280:768"})
  });
  if(!res.ok) throw new Error(`Runway error: ${res.status}`);
  const data = await res.json();
  const taskId = data.id;
  for(let i=0;i<40;i++){
    await new Promise(r=>setTimeout(r,5000));
    const poll = await fetch(`https://api.dev.runwayml.com/v1/tasks/${taskId}`,{headers:{"Authorization":`Bearer ${apiKey}`,"X-Runway-Version":"2024-11-06"}});
    const p = await poll.json();
    if(p.status==="SUCCEEDED") return p.output?.[0];
    if(p.status==="FAILED") throw new Error("Runway failed");
  }
  throw new Error("Timeout");
}

            {backtesting?"RUNNING BACKTEST...":"📊 Run 12-Month Backtest Simulation"}
          </button>
          {backtest&&<div style={{marginTop:10,padding:"14px",borderRadius:8,background:"#0d1520",border:"1px solid #1a2a3a"}}>
            <div style={{fontSize:10,color:"#5BA3E6",fontFamily:"monospace",marginBottom:8,fontWeight:700}}>BACKTEST RESULTS (12 MONTHS)</div>
            <svg width="100%" height="60" viewBox="0 0 240 60" style={{display:"block",marginBottom:10}}>
              <polyline points={backtest.curve.map((v,i)=>`${(i/(backtest.curve.length-1))*240},${60-((v-Math.min(...backtest.curve))/(Math.max(...backtest.curve)-Math.min(...backtest.curve)))*55}`).join(" ")} fill="none" stroke="#A3FF12" strokeWidth="1.5"/>
            </svg>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>

          </div>}

              </div>
              <div style={{fontSize:11,color:"#888",lineHeight:1.4}}>{r.desc}</div>
            </div>)}
          </div>}
        </div>

        <div style={{display:"flex",gap:8}}><Btn onClick={()=>setStep(1)} style={{flex:1}}>Back</Btn><Btn primary onClick={()=>setStep(3)} style={{flex:2}}>Review</Btn></div>
      </div>}
      {step===3&&<div>
        {[["Agent",cfg.name],["Capital",`${Number(cfg.aum).toLocaleString()} USDC`],["Network",cfg.chain],...(cfg.type==="perps"?[["Protocol",cfg.protocol.toUpperCase()],["Pair",cfg.pair],["Leverage",`${cfg.leverage}x`]]:[[]]),...[["Max Trade",`$${Number(cfg.maxTrade).toLocaleString()}`],["Stop Loss",`${cfg.stopLoss}%`],["Guard Rules",`${Object.values(guardRules).filter(Boolean).length}/6 active`],["Protection","ON"],["Privacy Mode",!cfg.privacy||cfg.privacy==="off"?"Standard":cfg.privacy==="zk"?"ZK-Shielded":"Full ZK"]]].map(([k,v],i)=>
          <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #1F2937",fontSize:13}}>
            <span style={{color:"#888"}}>{k}</span><span style={{color:"#fff"}}>{v}</span>
          </div>
        )}
        {!deploying&&<div style={{display:"flex",gap:8,marginTop:18}}><Btn onClick={()=>setStep(2)} style={{flex:1}}>Back</Btn><Btn primary onClick={handleDeploy} style={{flex:2}}>⚡ Deploy Agent</Btn></div>}
        {deploying&&<div style={{marginTop:20,padding:"20px 0"}}>
          {/* Protocol target banner */}
          <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 18px",borderRadius:10,background:"#0a0f0a",border:"1px solid #A3FF1240",marginBottom:20}}>
            <div style={{width:36,height:36,borderRadius:8,background:"#A3FF1215",border:"1px solid #A3FF1240",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>
              {cfg.type==="perps"?(cfg.protocol==="hyperliquid"?"🌊":cfg.protocol==="gmx"?"📊":"🔵"):"🤖"}
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>{cfg.name}</div>
              <div style={{fontSize:11,color:"#A3FF12"}}>
                {cfg.type==="perps"?`Deploying to ${cfg.protocol.toUpperCase()} · ${cfg.pair} · ${cfg.leverage}x leverage`:`Deploying to ${cfg.chain} network`}
              </div>
            </div>
            <div style={{width:18,height:18,border:"2px solid #1F2937",borderTopColor:"#A3FF12",borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>
          </div>
          {/* Deploy steps */}
          {[
            {label: cfg.type==="perps"?`Connecting to ${cfg.protocol.toUpperCase()} API`:"Initializing agent runtime", icon:"🔌"},
            {label: cfg.type==="perps"?`Funding wallet on ${cfg.chain} (${Number(cfg.aum).toLocaleString()} USDC)`:"Allocating capital", icon:"💰"},
            {label: cfg.type==="perps"?`Setting risk limits: max ${cfg.leverage}x · stop ${cfg.stopLoss}%`:"Applying risk policy", icon:"🛡️"},
            {label: cfg.type==="perps"?`Registering ${cfg.pair} strategy on-chain`:"Registering agent on-chain", icon:"⛓️"},
            {label: "Agent live — pre-sign screening active", icon:"✅"},
          ].map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid #111",opacity:deployStep>i?1:deployStep===i?0.9:0.25,transition:"opacity 0.3s"}}>
            <span style={{fontSize:14,width:22,textAlign:"center"}}>{deployStep>i?"✓":deployStep===i?s.icon:"○"}</span>
            <span style={{fontSize:12,color:deployStep>i?"#A3FF12":deployStep===i?"#fff":"#555",fontWeight:deployStep===i?600:400,fontFamily:"monospace"}}>{s.label}</span>
            {deployStep===i&&<div style={{marginLeft:"auto",width:14,height:14,border:"2px solid #1F2937",borderTopColor:"#A3FF12",borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>}
          </div>)}
        </div>}
      </div>}
    </Card>
  </div>;
}
